<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegas Marquee - Lofi Lounge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Limelight&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Dark background to make the lights pop */
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
        }

        /* The Outer Metal Frame */
        .marquee-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 8px;
            /* Creates the thick dark metal outer edge */
            box-shadow: 
                0 0 0 15px #222,
                0 20px 50px rgba(0,0,0,0.9);
            padding: 15px;
        }

        /* The Incandescent Bulb Border */
        .marquee-bulbs {
            border: 14px dotted #fff2a8; /* The actual bulbs */
            border-radius: 4px;
            padding: 2px;
            /* Glow effect for the bulbs */
            filter: drop-shadow(0 0 8px #ffaa00) drop-shadow(0 0 15px #ff5500);
        }

        /* The Inner Sign Board */
        .marquee-inner {
            background: radial-gradient(circle at center, #2a2b2e 0%, #111111 100%);
            border: 4px solid #333;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }

        /* Decorative Corners */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #555;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffaa00;
            font-size: 24px;
            text-shadow: 0 0 10px #ff0000;
        }
        .corner::after { content: '⚜'; }
        .corner-tl { top: 15px; left: 15px; }
        .corner-tr { top: 15px; right: 15px; }
        .corner-bl { bottom: 15px; left: 15px; }
        .corner-br { bottom: 15px; right: 15px; }

        /* Typography & Neon Effects */
        .date {
            font-family: 'Limelight', cursive;
            color: #ffeb73;
            font-size: 3.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 
                0 0 5px #fff,
                0 0 15px #ffaa00,
                0 0 30px #ff6600,
                2px 2px 0px rgba(0,0,0,0.8);
            margin-bottom: -10px;
        }

        .time {
            font-family: 'Great Vibes', cursive;
            color: #ffffff;
            font-size: 4.5rem;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #a6d8ff,
                0 0 40px #0077ff,
                0 0 80px #0077ff;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }

        .headliner {
            font-family: 'Limelight', cursive;
            color: #fff9d6;
            font-size: 4rem;
            letter-spacing: 4px;
            line-height: 1.2;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ffcc00,
                0 0 20px #ff8800,
                3px 3px 5px #000;
            margin: 10px 0;
        }

        .subtitle-neon {
            font-family: 'Oswald', sans-serif;
            font-weight: 400;
            color: #ffe6b3;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-shadow: 
                0 0 5px #ffcc00,
                0 0 15px #ff6600,
                0 0 30px #ff3300;
            margin-bottom: 5px;
        }

        .script-neon {
            font-family: 'Great Vibes', cursive;
            color: #ffb366;
            font-size: 3.5rem;
            text-shadow: 
                0 0 5px #fff,
                0 0 15px #ffaa00,
                0 0 30px #ff4400;
        }

        .location-wrapper {
            margin-top: 30px;
            font-size: 2rem;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .pink-neon {
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ffb3e6,
                0 0 20px #ff00aa,
                0 0 40px #ff00aa;
        }

        .blue-neon {
            color: #e6f2ff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #b3d9ff,
                0 0 20px #0088ff,
                0 0 40px #0088ff;
        }

        .diamond {
            color: #ffcc00;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #ffaa00;
        }

        /* Horizontal Bulb Dividers */
        .divider {
            width: 90%;
            margin: 25px auto;
            border-top: 8px dotted #fff2a8;
            filter: drop-shadow(0 0 5px #ffaa00) drop-shadow(0 0 10px #ff5500);
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .date { font-size: 2.5rem; }
            .time { font-size: 3.5rem; }
            .headliner { font-size: 2.5rem; }
            .subtitle-neon { font-size: 1.8rem; }
            .script-neon { font-size: 2.5rem; }
            .location-wrapper { font-size: 1.2rem; }
            .marquee-inner { padding: 30px 10px; }
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-bulbs">
            <div class="marquee-inner">
                
                <!-- <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div> -->

                <div class="date">MAY 16th</div>
                <div class="time">8pm – 12am</div>
                
                <div class="divider"></div>
                
                <h1 class="headliner">DJ DEPHCON<br>TONY FUZE</h1>
                
                <div class="divider"></div>
                
                <div class="subtitle-neon">UNDERGROUND HOUSE</div>
                <div class="script-neon">Jazz Funk Deep</div>
                
                <div class="location-wrapper">
                    <span class="pink-neon">LOFI LOUNGE</span>
                    <span class="diamond">◆</span>
                    <span class="blue-neon">DOWNTOWN SAN LUIS OBISPO</span>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
